<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <title>Internal Orders — SSL Access Parts</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('io-theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="landing">
    <button type="button" class="theme-toggle landing-theme" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
    <img src="/favicon.png" class="logo-big" alt="SSL logo">
    <div>
      <h1>Internal Orders</h1>
      <p class="tagline">SSL Access Parts — order tracking</p>
    </div>
    <div class="landing-links">
      <a href="salesman.html" class="primary">
        <span>Salesman — Submit / Track Orders</span>
        <span>→</span>
      </a>
      <a href="admin.html">
        <span>Admin — Manage Orders</span>
        <span>→</span>
      </a>
    </div>
  </div>
  <script type="module">
    const KEY = 'io-theme';
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      const btn = document.getElementById('themeToggle');
      if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
    }
    applyTheme(localStorage.getItem(KEY) || 'light');
    document.getElementById('themeToggle')?.addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      localStorage.setItem(KEY, next);
      applyTheme(next);
    });
  </script>
</body>
</html>
