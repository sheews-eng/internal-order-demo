<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Orders</title>

    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script>
      (function () {
        try {
          var t = localStorage.getItem('io-theme') || 'light';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
</head>
<body>

    <header class="app-header">
        <img src="/favicon.png" class="logo" alt="SSL">
        <h1>Admin</h1>
        <div class="header-actions">
            <button type="button" class="theme-toggle" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
            <a href="index.html" class="badge-role">Home</a>
        </div>
    </header>

    <nav class="tab-bar">
        <button class="tab-btn active" data-tab="active">
            Active <span class="tab-count" id="activeCount"></span>
            <span class="urgent-dot" id="activeUrgentDot"></span>
        </button>
        <button class="tab-btn" data-tab="history">History</button>
    </nav>

    <!-- ===================== ACTIVE ORDERS ===================== -->
    <section class="tab-panel active" data-panel="active">
        <div class="search-bar">
            <input type="text" id="orderSearch" placeholder="Search company, PO#, ATTN, item, amount...">
        </div>
        <div id="orders-container"></div>
    </section>

    <!-- ===================== HISTORY (deleted) ===================== -->
    <section class="tab-panel" data-panel="history">
        <div id="history-container"></div>
    </section>

    <div id="toast-root" class="toast-root" aria-live="polite"></div>
    <div id="modal-root"></div>

    <script type="module" src="scripts.js"></script>
</body>
</html>
